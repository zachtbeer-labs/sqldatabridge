name: Preview

on:
  workflow_dispatch:
    inputs:
      base_version:
        description: "Base version the preview targets (e.g. 1.1.0)"
        required: true
      preview_label:
        description: "Prerelease label (e.g. preview, alpha, beta, rc, preview-export)"
        required: false
        default: "preview"

concurrency:
  group: preview-publish
  cancel-in-progress: false

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Compute preview version
        run: echo "PKG_VERSION=${{ inputs.base_version }}-${{ inputs.preview_label }}.${{ github.run_number }}" >> $GITHUB_ENV

      - run: dotnet restore SqlDataBridge.sln
      - run: dotnet build SqlDataBridge.sln -c Release --no-restore /p:Version=${{ env.PKG_VERSION }} /p:PackageVersion=${{ env.PKG_VERSION }} /p:InformationalVersion=${{ env.PKG_VERSION }}+sha.${{ github.sha }}
      - run: dotnet test tests/SqlDataBridge.Tests/SqlDataBridge.Tests.csproj -c Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack src/SqlDataBridge/SqlDataBridge.csproj -c Release --no-build -o ./preview-packages /p:Version=${{ env.PKG_VERSION }} /p:PackageVersion=${{ env.PKG_VERSION }} /p:InformationalVersion=${{ env.PKG_VERSION }}+sha.${{ github.sha }}

      - name: Upload packages
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nuget-preview-packages
          path: |
            ./preview-packages/*.nupkg
            ./preview-packages/*.snupkg

      - name: NuGet login (OIDC trusted publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: dotnet nuget push "./preview-packages/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --skip-duplicate

      - name: Push symbols to NuGet.org
        run: dotnet nuget push "./preview-packages/*.snupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --skip-duplicate

      - name: Summary
        run: |
          echo "## Published preview package" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ env.PKG_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Ref:** \`${{ github.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install with:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "dotnet add package SqlDataBridge --version ${{ env.PKG_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
