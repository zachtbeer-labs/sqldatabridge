name: Bug report
description: Report a reproducible problem with export, package validation, or import.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail to reproduce the behavior without sharing secrets.
  - type: input
    id: package-version
    attributes:
      label: Package version
      description: Which SqlDataBridge version are you using?
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: target-framework
    attributes:
      label: Target framework
      placeholder: net8.0
    validations:
      required: true
  - type: input
    id: sql-server-version
    attributes:
      label: SQL Server version
      placeholder: SQL Server 2022, Azure SQL, etc.
    validations:
      required: true
  - type: textarea
    id: scenario
    attributes:
      label: Scenario
      description: What were you trying to export or import?
    validations:
      required: true
  - type: textarea
    id: schema
    attributes:
      label: Relevant schema or types
      description: Include table/column definitions or SQL Server types involved. Remove sensitive names if needed.
      render: sql
  - type: textarea
    id: exception
    attributes:
      label: Exception or failure output
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
